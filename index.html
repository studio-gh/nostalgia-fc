<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nostalgia FC - Manager v2 (Expansão Ligas)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="jogadores.js"></script>
    <script src="motor.js"></script>
    <style>
        body { background: #0A0A0A; color: #FFF; font-family: system-ui, sans-serif; user-select: none; }
        .campo-gramado { background: linear-gradient(to bottom, #15803d 50%, #166534 50%); background-size: 100% 40px; border: 4px solid #FFF; position: relative; }
        .linha-meio { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.6); }
        .circulo-central { position: absolute; top: 50%; left: 50%; width: 70px; height: 70px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // === ESTADOS CORE ===
            const [fase, setFase] = React.useState('MENU_LIGA'); 
            const [ligaSelecionada, setLigaSelecionada] = React.useState('Série A');
            const [meuTimeTitular, setMeuTimeTitular] = React.useState(Array(11).fill(null));
            const [meuTimeReserva, setMeuTimeReserva] = React.useState(Array(5).fill(null));
            const [orcamento, setOrcamento] = React.useState(750);
            const [slotSelecionado, setSlotSelecionado] = React.useState(null);
            const [opcoesDraft, setOpcoesDraft] = React.useState([]);
            const [timeAdversario, setTimeAdversario] = React.useState(null);
            
            // === ESTADOS MOTOR DA PARTIDA ===
            const [partida, setPartida] = React.useState({
                minuto: 0, placarSeu: 0, placarAdv: 0, emAndamento: false, historico: []
            });
            const [narracao, setNarracao] = React.useState('Preparando os vestiários...');
            const [gritoTecnico, setGritoTecnico] = React.useState('EQUILIBRADO');

            // === DEFINIÇÃO DE POSIÇÕES PADRÃO (4-3-3) ===
            const posicoesSlots = [
                'GOL', 'ZAG', 'ZAG', 'ZAG', 'ZAG',
                'MEI', 'MEI', 'MEI',
                'ATA', 'ATA', 'ATA'
            ];

            // === REGRA DE OURO: ROLAGEM DO DADO POR POSIÇÃO SEM REPETIÇÃO DE NOME ===
            const rolarDadoPorPosicao = (posicaoAtual) => {
                let candidatos = bancoJogadores.filter(j => j.liga === ligaSelecionada && j.posicao === posicaoAtual);
                
                // Remove qualquer jogador cujo NOME já esteja no time (titular ou reserva)
                const nomesNoMeuTime = [...meuTimeTitular, ...meuTimeReserva].filter(Boolean).map(j => j.name);
                candidatos = candidatos.filter(j => !nomesNoMeuTime.includes(j.name));

                // Fallback de segurança para não quebrar caso acabem os jogadores
                if (candidatos.length === 0) {
                    candidatos = bancoJogadores.filter(j => j.posicao === posicaoAtual && j.liga === ligaSelecionada);
                }

                const indiceSorteado = Math.floor(Math.random() * candidatos.length);
                return candidatos[indiceSorteado];
            };

            // === SISTEMA DE DRAFT POR SLOT ===
            const iniciarDraftSlot = (index, tipo) => {
                setSlotSelecionado({ index, tipo });
                const posicaoNecessaria = tipo === 'titular' ? posicoesSlots[index] : 'MIX';
                
                let cookiesOpc = [];
                let tentativas = 0;
                
                while(cookiesOpc.length < 3 && tentativas < 50) {
                    tentativas++;
                    const posSorteio = posicaoNecessaria === 'MIX' ? ['ZAG','MEI','ATA'][Math.floor(Math.random()*3)] : posicaoNecessaria;
                    let jogadorSorteado = rolarDadoPorPosicao(posSorteio);
                    
                    if (jogadorSorteado && !cookiesOpc.some(o => o.name === jogadorSorteado.name)) {
                        cookiesOpc.push({
                            ...jogadorSorteado,
                            moral: ['🡢', '🡡', '🡣', '🡤', '🡥'][Math.floor(Math.random() * 5)],
                            estamina: 100
                        });
                    }
                }
                setOpcoesDraft(cookiesOpc);
            };

            const escolherJogador = (jogador) => {
                if (orcamento < jogador.cost) {
                    alert('🚨 SALARY CAP INSUFICIENTE!');
                    return;
                }

                setOrcamento(prev => prev - jogador.cost);
                if (slotSelecionado.tipo === 'titular') {
                    const novo = [...meuTimeTitular];
                    novo[slotSelecionado.index] = jogador;
                    setMeuTimeTitular(novo);
                } else {
                    const novo = [...meuTimeReserva];
                    novo[slotSelecionado.index] = jogador;
                    setMeuTimeReserva(novo);
                }
                setSlotSelecionado(null);
                setOpcoesDraft([]);
            };

            // === ADVERSÁRIO COERENTE COM A LIGA SELECIONADA ===
            const iniciarFasePartida = () => {
                const timesDaLiga = [...new Set(bancoJogadores.filter(j => j.liga === ligaSelecionada).map(j => j.time))];
                const timeSorteado = timesDaLiga[Math.floor(Math.random() * timesDaLiga.length)];
                
                setTimeAdversario({
                    nome: timeSorteado,
                    ratingGeral: Math.floor(Math.random() * 10) + 82
                });

                setPartida({
                    minuto: 0, placarSeu: 0, placarAdv: 0, emAndamento: false, historico: []
                });
                setFase('PRE_PARTIDA');
            };

            // === CONTROLES DO MOTOR DE SIMULAÇÃO ===
            React.useEffect(() => {
                let intervalo = null;
                if (partida.emAndamento && partida.minuto < 90) {
                    intervalo = setInterval(() => {
                        setPartida(prev => {
                            if (prev.minuto >= 90) {
                                clearInterval(intervalo);
                                return { ...prev, emAndamento: false };
                            }

                            const forcaSua = meuTimeTitular.filter(Boolean).reduce((acc, j) => acc + j.rating, 0) / 11;
                            const modGrito = gritoTecnico === 'OFENSIVO' ? 1.1 : gritoTecnico === 'DEFENSIVO' ? 0.9 : 1.0;
                            
                            let lance = Math.random() * 100;
                            let novoPlacarSeu = prev.placarSeu;
                            let novoPlacarAdv = prev.placarAdv;
                            let eventoTexto = '';

                            if (lance > 96) {
                                if ((forcaSua * modGrito) > timeAdversario.ratingGeral) {
                                    novoPlacarSeu++;
                                    eventoTexto = `⚽ GOL DO NOSSO TIME! Minuto ${prev.minuto + 5}!`;
                                } else {
                                    novoPlacarAdv++;
                                    eventoTexto = `⚠️ Gol do ${timeAdversario.nome}! Minuto ${prev.minuto + 5}.`;
                                }
                                setNarracao(eventoTexto);
                            }

                            return {
                                ...prev,
                                minuto: prev.minuto + 5,
                                placarSeu: novoPlacarSeu,
                                placarAdv: novoPlacarAdv,
                                historico: eventoTexto ? [...prev.historico, eventoTexto] : prev.historico
                            };
                        });
                    }, 600);
                } else {
                    clearInterval(intervalo);
                }
                return () => clearInterval(intervalo);
            }, [partida.emAndamento, partida.minuto]);

            return (
                <div className="max-w-md mx-auto bg-neutral-900 min-h-screen flex flex-col p-4 border-x border-neutral-800 shadow-2xl">
                    
                    {/* TELA 1: MENU DE LIGAS */}
                    {fase === 'MENU_LIGA' && (
                        <div className="flex flex-col items-center justify-center flex-1 text-center space-y-6">
                            <h1 className="text-3xl font-black tracking-tighter text-amber-500 uppercase">NOSTALGIA FC</h1>
                            <p className="text-sm text-zinc-400 font-medium px-4">Escolha o campeonato clássico para iniciar o seu Draft de lendas:</p>
                            
                            <div className="w-full space-y-3 px-4">
                                <button onClick={() => { setLigaSelecionada('Série A'); setFase('DRAFT'); }} className="w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-xl border border-zinc-700 font-bold text-lg flex items-center justify-center gap-2 transition-transform active:scale-95">
                                    🇮🇹 Série A Clássica
                                </button>
                                <button onClick={() => { setLigaSelecionada('La Liga'); setFase('DRAFT'); }} className="w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-xl border border-zinc-700 font-bold text-lg flex items-center justify-center gap-2 transition-transform active:scale-95">
                                    🇪🇸 La Liga Clássica
                                </button>
                            </div>
                        </div>
                    )}

                    {/* TELA 2: O QUADRO DO DRAFT */}
                    {fase === 'DRAFT' && (
                        <div className="flex flex-col flex-1 space-y-4">
                            <div className="flex justify-between items-center bg-zinc-800 p-3 rounded-xl border border-zinc-700">
                                <div>
                                    <span className="text-xs text-zinc-400 font-bold block uppercase tracking-wider">Competição</span>
                                    <span className="font-black text-amber-500">{ligaSelecionada === 'Série A' ? '🇮🇹 Série A' : '🇪🇸 La Liga'}</span>
                                </div>
                                <div className="text-right">
                                    <span className="text-xs text-zinc-400 font-bold block uppercase tracking-wider">Salary Cap</span>
                                    <span className="font-black text-green-400 text-lg">${orcamento}M</span>
                                </div>
                            </div>

                            <h2 className="text-xs font-black uppercase text-zinc-400 tracking-widest">Escalação Titular (4-3-3)</h2>
                            <div className="grid grid-cols-4 gap-2">
                                {posicoesSlots.map((pos, idx) => (
                                    <button key={idx} onClick={() => iniciarDraftSlot(idx, 'titular')} className={`p-2 rounded-lg text-left relative flex flex-col justify-between h-16 transition-all ${meuTimeTitular[idx] ? 'bg-zinc-800 border-l-4 border-amber-500' : 'bg-zinc-900 border border-dashed border-zinc-700'}`}>
                                        <span className="text-[10px] font-black text-zinc-500 uppercase">{pos}</span>
                                        <span className="text-xs font-bold truncate w-full">{meuTimeTitular[idx]?.name || 'Girar Dado'}</span>
                                        {meuTimeTitular[idx] && <span className="absolute top-1 right-1 text-[10px] font-black text-amber-400">{meuTimeTitular[idx].rating}</span>}
                                    </button>
                                ))}
                            </div>

                            <h2 className="text-xs font-black uppercase text-zinc-400 tracking-widest mt-2">Banco de Reservas</h2>
                            <div className="grid grid-cols-5 gap-1.5">
                                {meuTimeReserva.map((_, idx) => (
                                    <button key={idx} onClick={() => iniciarDraftSlot(idx, 'reserva')} className={`p-1.5 rounded-lg text-center h-14 flex flex-col justify-between transition-all ${meuTimeReserva[idx] ? 'bg-zinc-800 border-t-2 border-green-500' : 'bg-zinc-900 border border-dashed border-zinc-700'}`}>
                                        <span className="text-[9px] font-bold text-zinc-500">RES</span>
                                        <span className="text-[10px] font-bold truncate w-full">{meuTimeReserva[idx]?.name || 'Dado'}</span>
                                    </button>
                                ))}
                            </div>

                            {opcoesDraft.length > 0 && (
                                <div className="bg-zinc-950 p-3 rounded-xl border-2 border-amber-500 space-y-2 mt-auto">
                                    <div className="text-xs font-black text-amber-500 uppercase tracking-wider">🎲 O Dado parou! Escolha uma opção:</div>
                                    <div className="space-y-2">
                                        {opcoesDraft.map((op, i) => (
                                            <button key={i} onClick={() => escolherJogador(op)} className="w-full flex justify-between items-center bg-zinc-900 p-2.5 rounded-lg border border-zinc-800 hover:bg-zinc-800 transition-colors">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded">{op.posicao}</span>
                                                    <span className="font-bold text-sm">{op.name}</span>
                                                    <span className="text-xs text-zinc-500">({op.time})</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-xs font-bold text-amber-400">Nível {op.rating}</span>
                                                    <span className="text-xs font-black text-green-400">${op.cost}M</span>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <button onClick={iniciarFasePartida} disabled={meuTimeTitular.includes(null)} className="w-full py-3.5 mt-auto bg-green-600 hover:bg-green-500 disabled:opacity-40 font-black rounded-xl text-center uppercase tracking-wider transition-all shadow-lg shadow-green-900/20">
                                Avançar para a Partida 🡢
                            </button>
                        </div>
                    )}

                    {/* TELA 3: SIMULAÇÃO 90 MINUTOS */}
                    {(fase === 'PRE_PARTIDA' || fase === 'EM_JOGO') && (
                        <div className="flex flex-col flex-1 space-y-4">
                            <div className="bg-zinc-950 p-4 rounded-2xl border border-zinc-800 flex justify-between items-center text-center">
                                <div className="w-1/3">
                                    <span className="font-black text-sm block truncate">MEU TIME</span>
                                    <span className="text-3xl font-black text-white">{partida.placarSeu}</span>
                                </div>
                                <div className="bg-zinc-800 px-3 py-1 rounded-full text-xs font-black text-amber-400">
                                    {partida.minuto}'
                                </div>
                                <div className="w-1/3">
                                    <span className="font-black text-sm block truncate text-zinc-400">{timeAdversario?.nome}</span>
                                    <span className="text-3xl font-black text-zinc-400">{partida.placarAdv}</span>
                                </div>
                            </div>

                            <div className="bg-zinc-900 p-3 rounded-xl min-h-[60px] border border-zinc-800 flex items-center justify-center text-center text-sm font-bold text-zinc-300">
                                {narracao}
                            </div>

                            <div className="grid grid-cols-3 gap-2">
                                {['DEFENSIVO', 'EQUILIBRADO', 'OFENSIVO'].map((grito) => (
                                    <button key={grito} onClick={() => setGritoTecnico(grito)} className={`py-2 rounded-lg font-black text-xs uppercase tracking-wider transition-all ${gritoTecnico === grito ? 'bg-amber-500 text-neutral-950 scale-105' : 'bg-zinc-800 text-zinc-400'}`}>
                                        {grito}
                                    </button>
                                ))}
                            </div>

                            <div className="mt-auto space-y-2">
                                <button onClick={() => setPartida(prev => ({ ...prev, emAndamento: !prev.emAndamento }))} disabled={partida.minuto >= 90} className={`w-full py-3.5 rounded-xl font-black uppercase text-sm tracking-wider shadow-md ${partida.emAndamento ? 'bg-yellow-600' : 'bg-green-600'}`}>
                                    {partida.minuto >= 90 ? '🏁 Partida Encerrada' : partida.emAndamento ? '⏸️ Pausar Simulação' : '▶️ Iniciar Partida'}
                                </button>
                                
                                <button onClick={() => { setFase('MENU_LIGA'); setMeuTimeTitular(Array(11).fill(null)); setMeuTimeReserva(Array(5).fill(null)); setOrcamento(750); }} disabled={partida.minuto < 90} className="w-full bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl font-bold text-xs uppercase tracking-widest text-zinc-400 disabled:opacity-20">
                                    Voltar ao Menu Inicial 🡠
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
