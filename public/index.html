<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia FC</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Certifique-se de que jogadores.js e motor.js contenham apenas variáveis globais sem 'export' -->
    <script src="jogadores.js"></script> 
    <script src="motor.js"></script>
    <style>
        body { background: #0A0A0A; color: #FFF; font-family: sans-serif; }
        .titulo-retro { font-size: 2.5rem; color: #f1bf00; text-align: center; margin-top: 50px; }
        .botoes-liga-container { display: flex; flex-direction: column; gap: 20px; max-width: 300px; margin: 40px auto; }
        .btn-retro { padding: 18px; border: 4px solid #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-italia { background-color: #004BB4; color: #fff; }
        .btn-espanha { background-color: #C60B1E; color: #F1BF00; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    function App() {
        const [faseJogo, setFaseJogo] = React.useState('SELECAO_LIGA');
        const [ligaSelecionada, setLigaSelecionada] = React.useState('');
        const [titulares, setTitulares] = React.useState([]);
        const [reservas, setReservas] = React.useState([]);
        const [opcoesDraft, setOpcoesDraft] = React.useState([]);
        const [orcamento, setOrcamento] = React.useState(100000);

        // Acessa PLAYERS_DB e bancoJogadores globalmente (devem estar em jogadores.js)
        const rolarDadoDraft = () => {
            if (typeof PLAYERS_DB === 'undefined') {
                alert("Erro: Base de dados não carregada.");
                return;
            }
            // Filtra os jogadores da liga selecionada
            const candidatos = Object.values(PLAYERS_DB)
                .flat()
                .filter(jog => jog.liga === ligaSelecionada);

            const embaralhado = [...candidatos].sort(() => 0.5 - Math.random());
            setOpcoesDraft(embaralhado.slice(0, 3));
        };

        const escolherJogador = (jogador) => {
            if (jogador.custo > orcamento) {
                alert("Orçamento insuficiente!");
                return;
            }
            setOrcamento(prev => prev - jogador.custo);
            setTitulares(prev => [...prev, jogador]);
            setOpcoesDraft([]);
        };

        return (
            <div>
                {faseJogo === 'SELECAO_LIGA' && (
                    <div className="text-center">
                        <h1 className="titulo-retro">NOSTALGIA FC</h1>
                        <div className="botoes-liga-container">
                            <button className="btn-retro btn-italia" onClick={() => { setLigaSelecionada('Série A'); setFaseJogo('DRAFT'); }}>SÉRIE A</button>
                            <button className="btn-retro btn-espanha" onClick={() => { setLigaSelecionada('La Liga'); setFaseJogo('DRAFT'); }}>LA LIGA</button>
                        </div>
                    </div>
                )}

                {faseJogo === 'DRAFT' && (
                    <div className="p-4">
                        <h2 className="text-center">Draft - {ligaSelecionada} | Saldo: {orcamento}</h2>
                        <button className="btn-retro w-full" onClick={rolarDadoDraft}>🎲 Sortear Jogadores</button>
                        <div className="mt-5">
                            {opcoesDraft.map((j, i) => (
                                <div key={i} className="bg-gray-800 p-4 mb-2" onClick={() => escolherJogador(j)}>
                                    {j.name} - {j.custo}M
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
